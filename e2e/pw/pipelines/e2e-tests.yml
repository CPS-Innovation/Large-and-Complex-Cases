trigger: none

schedules:
  - cron: "0 6 * * 1-5"
    displayName: "Weekday morning run"
    branches:
      include:
        - main
    always: true

parameters:
  - name: environment
    displayName: "Environment"
    type: string
    default: dev
    values:
      - dev
      - qa

  - name: fileSizeMB
    displayName: "Test file size (MB)"
    type: number
    default: 100

  - name: fileCount
    displayName: "Number of test files"
    type: number
    default: 1

  - name: testsToRun
    displayName: "Tests to run"
    type: string
    default: all
    values:
      - all
      - egress-to-netapp-copy
      - egress-to-netapp-move
      - netapp-to-egress-copy

pool:
  name: "LACC PreProd Pool"

variables:
  - group: lacc-e2e-secrets-${{ parameters.environment }}
  - name: ENVIRONMENT
    value: ${{ parameters.environment }}
  - name: TEST_FILE_SIZE_MB
    value: ${{ parameters.fileSizeMB }}
  - name: TEST_FILE_COUNT
    value: ${{ parameters.fileCount }}
  - name: workingDirectory
    value: "e2e/pw"

steps:
  - task: NodeTool@0
    displayName: "Install Node.js"
    inputs:
      versionSpec: "20.x"

  - script: npm ci
    displayName: "Install dependencies"
    workingDirectory: $(workingDirectory)

  - script: npx playwright install --with-deps chromium
    displayName: "Install Playwright browsers"
    workingDirectory: $(workingDirectory)

  - script: npx playwright test ${{ replace(replace(parameters.testsToRun, 'all', ''), '-', ' ') }}
    displayName: "Run E2E tests"
    workingDirectory: $(workingDirectory)
    env:
      ENVIRONMENT: $(ENVIRONMENT)
      BASE_URL: $(BASE_URL)
      CMS_LOGIN_PAGE: $(CMS_LOGIN_PAGE)
      CASE_API_BASE_URL: $(CASE_API_BASE_URL)
      DDEI_BASE_URL: $(DDEI_BASE_URL)
      EGRESS_BASE_URL: $(EGRESS_BASE_URL)
      TENANT_ID: $(TENANT_ID)
      CLIENT_ID: $(CLIENT_ID)
      E2E_AD_USER: $(E2E_AD_USER)
      E2E_AD_PASSWORD: $(E2E_AD_PASSWORD)
      CMS_USERNAME: $(CMS_USERNAME)
      CMS_PASSWORD: $(CMS_PASSWORD)
      DDEI_ACCESS_KEY: $(DDEI_ACCESS_KEY)
      EGRESS_SERVICE_ACCOUNT_AUTH: $(EGRESS_SERVICE_ACCOUNT_AUTH)
      EGRESS_TEMPLATE_ID: $(EGRESS_TEMPLATE_ID)
      EGRESS_ADMIN_ROLE_ID: $(EGRESS_ADMIN_ROLE_ID)
      TEST_FILE_SIZE_MB: $(TEST_FILE_SIZE_MB)
      TEST_FILE_COUNT: $(TEST_FILE_COUNT)
      CI: "true"
    continueOnError: true

  - task: PublishPipelineArtifact@1
    displayName: "Publish HTML report"
    condition: always()
    inputs:
      targetPath: "$(workingDirectory)/playwright-report"
      artifact: "playwright-report-${{ parameters.environment }}"
      publishLocation: "pipeline"

  - task: PublishTestResults@2
    displayName: "Publish test results"
    condition: always()
    inputs:
      testResultsFormat: "JUnit"
      testResultsFiles: "$(workingDirectory)/test-results/*.xml"
      mergeTestResults: true
      testRunTitle: "E2E Tests - ${{ parameters.environment }}"
