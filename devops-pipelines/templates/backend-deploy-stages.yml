parameters:
  - name: environment
    displayName: "Target Environment"
    type: string
    default: "dev"
    values:
      - dev
      - staging
      - prod
  - name: agentPool
    type: string
    default: "LACC PreProd Pool"
    values:
      - "LACC PreProd Pool"
      - "LACC Prod Pool"
  - name: requireValidation
    type: boolean
    default: false
  - name: notifyUsers
    type: string
    default: ""
  - name: approvers
    type: string
    default: ""
  - name: azureSubscription
    type: string
    default: "Azure Pipeline: Large and Complex Cases - Pre-Prod"
  - name: deployToSlot
    type: boolean
    default: false
  - name: slotName
    type: string
    default: ""
  - name: runPostmanSmokeTest
    type: boolean
    default: false

stages:
  - stage: Approve_Deployment_${{ parameters.environment }}
    ${{ if eq(parameters.environment, 'staging') }}:
      dependsOn: Deploy_Backend_dev
    ${{ if eq(parameters.environment, 'prod') }}:
      dependsOn: Deploy_Backend_staging
    displayName: "${{ parameters.environment }} - Approve Deployment"
    condition: and(succeeded(), ${{ eq(parameters.requireValidation, true) }})
    jobs:
      - template: ./manual-validation-jobs.yml
        parameters:
          instructions: "Please verify the deployment to the lower environment worked as expected before approving deployment to ${{parameters.environment}}."
          notifyUsers: ${{ parameters.notifyUsers }}
          approvers: ${{ parameters.approvers }}
          agentPool: ${{ parameters.agentPool }}

  - stage: Deploy_Backend_${{ parameters.environment }}
    ${{ if eq(parameters.requireValidation, true) }}:
      dependsOn:
        - Approve_Deployment_${{ parameters.environment }}
        - Preflight # Stage 'Preflight' is defined in the caller pipeline
    ${{ else }}:
      dependsOn:
        - Build_API # Stage 'Build_API' is defined in the caller pipeline
        - Preflight
    displayName: "${{ parameters.environment }} - Deploy Backend Services"
    variables:
      - name: runDbMigration # The Preflight stage outputs the flag 'runDbMigrationSteps'
        value: $[ eq(stageDependencies.Preflight.Check_DB_Diff.outputs['Diff_Check.runDbMigrationSteps'],'true') ]
      - template: ./variables/backend-deploy-vars.yml
        parameters:
          environment: ${{ parameters.environment }}
      - template: ./variables/fa-config-${{parameters.environment}}.yml
      - ${{ if eq(parameters.runPostmanSmokeTest, true) }}:
          - group: lacc-automated-testing-${{ parameters.environment }}
          - group: lacc-backend-secrets-${{ parameters.environment }}
    pool: ${{ parameters.agentPool }}
    jobs:
      - deployment: Deploy_Database_Changes
        displayName: "${{ parameters.environment }} - Deploy Database Changes"
        environment: "LACC-Backend-${{ parameters.environment }}"
        condition: eq(variables.runDbMigration, 'true')
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  sparseCheckoutDirectories: devops-pipelines/scripts
                  fetchDepth: 1

                - task: Bash@3
                  displayName: "Ensure Azure CLI"
                  inputs:
                    targetType: "inline"
                    script: |
                      echo "Checking if Azure CLI is installed..."

                      # Check if az command exists
                      if command -v az &> /dev/null; then
                        echo "Azure CLI is already installed"
                        az --version
                        exit 0
                      fi

                      echo "Azure CLI not found, installing..."
                      bash $(scripts_directory)/installAzureCli.sh

                - download: current
                  artifact: "database-scripts-drop"

                - task: AzureCLI@2
                  displayName: "Run Database Migration"
                  inputs:
                    azureSubscription: ${{ parameters.azureSubscription }}
                    scriptType: "bash"
                    scriptLocation: "inlineScript"
                    inlineScript: |
                      # Get the clientId of the service principal used for the current deployment 
                      appId=$(az account show --query user.name -o tsv)

                      # Get the service principal's app registration display name
                      export SERVICE_PRINCIPAL=$(az ad app show --id "$appId" --query displayName -o tsv 2>/dev/null || true)

                      if [ -z "$SERVICE_PRINCIPAL" ]; then
                        echo "Service Principal's display name could not be found."
                        exit 1
                      fi

                      echo "Service Principal display name: $SERVICE_PRINCIPAL"

                      bash $(scripts_directory)/updateDatabase.sh
                  env:
                    KEY_VAULT_NAME: $(keyVaultName)
                    MIGRATION_SCRIPT_PATH: "$(Pipeline.Workspace)/database-scripts-drop/migration-script.sql"

                - template: ./runner-cleanup-steps.yml
                  parameters:
                    buildArtifact: "database-scripts-drop"

      - deployment: Deploy_Main_API
        dependsOn: Deploy_Database_Changes
        condition: in(dependencies.Deploy_Database_Changes.result, 'Succeeded', 'Skipped')
        displayName: "${{ parameters.environment }} - Deploy Main API Function App"
        environment: "LACC-Backend-${{ parameters.environment }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ./fa-deploy-steps.yml
                  parameters:
                    environment: ${{ parameters.environment }}
                    azureSubscription: ${{ parameters.azureSubscription }}
                    functionAppName: "fa-lacc-api-${{ parameters.environment }}"
                    buildArtifactName: "lacc-main-api-drop"
                    deployToSlot: ${{ parameters.deployToSlot }}
                    slotName: ${{ parameters.slotName }}
                    runPostmanSmokeTest: ${{ parameters.runPostmanSmokeTest }}
                    postmanCollectionPath: "$(System.DefaultWorkingDirectory)/backend/postman/LCCMainAPISmokeTest.postman_collection.json"

                - template: ./runner-cleanup-steps.yml
                  parameters:
                    buildArtifact: "lacc-main-api-drop"

      - deployment: Deploy_FileTransfer_API
        dependsOn: Deploy_Database_Changes
        condition: in(dependencies.Deploy_Database_Changes.result, 'Succeeded', 'Skipped')
        displayName: "${{ parameters.environment }} - Deploy FileTransfer API Function App"
        environment: "LACC-Backend-${{ parameters.environment }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ./fa-deploy-steps.yml
                  parameters:
                    environment: ${{ parameters.environment }}
                    azureSubscription: ${{ parameters.azureSubscription }}
                    functionAppName: "fa-lacc-filetransfer-api-${{ parameters.environment }}"
                    buildArtifactName: "lacc-filetransfer-api-drop"
                    deployToSlot: ${{ parameters.deployToSlot }}
                    slotName: ${{ parameters.slotName }}

                - template: ./runner-cleanup-steps.yml
                  parameters:
                    buildArtifact: "lacc-filetransfer-api-drop"
